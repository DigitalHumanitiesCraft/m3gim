<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lebenspartitur — M³GIM</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/lebenspartitur.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body class="info-page">

  <header class="app-header">
    <a href="index.html" class="app-header__brand">M³GIM</a>
    <div class="app-header__subtitle">Teilnachlass Ira Malaniuk — UAKUG/NIM</div>
    <a href="projekt.html" class="app-header__badge">Research Preview</a>
    <div class="app-header__spacer"></div>
    <nav class="app-header__nav" aria-label="Informationsseiten">
      <a href="about.html">Über</a>
      <a href="projekt.html">Projekt</a>
      <a href="lebensstationen.html">Stationen</a>
      <a href="lebenspartitur.html" class="active">Partitur</a>
    </nav>
  </header>

  <main class="lp-main">
    <!-- Toolbar -->
    <div class="lp-toolbar">
      <span class="lp-toolbar__title">Lebenspartitur</span>
      <span class="lp-toolbar__spacer"></span>
      <div class="lp-toolbar__badges">
        <span class="lp-toolbar__badge">FF1</span>
        <span class="lp-toolbar__badge">FF2</span>
        <span class="lp-toolbar__badge">FF3</span>
        <span class="lp-toolbar__badge">FF4</span>
      </div>
    </div>

    <!-- 3-Column Grid -->
    <div class="lp-grid">
      <div class="lp-grid__netzwerk">
        <div class="lp-facet-label">Netzwerk</div>
        <div id="netzwerk-container"></div>
      </div>
      <div class="lp-grid__chart">
        <div id="chart-container" style="position:relative;"></div>
        <div id="tooltip" class="lp-tooltip"></div>
      </div>
      <div class="lp-grid__repertoire">
        <div class="lp-facet-label">Repertoire</div>
        <div id="repertoire-container"></div>
      </div>
    </div>

    <!-- Legend -->
    <div class="lp-legend">
      <span class="lp-legend__item"><span class="lp-legend__swatch" style="background:#004A8F;opacity:0.6;"></span> Wohnort</span>
      <span class="lp-legend__item"><span class="lp-legend__swatch" style="background:#9A7B4F;opacity:0.5;"></span> Aufführungsort</span>
      <span class="lp-legend__item"><span class="lp-legend__swatch--dashed" style="border-color:#004A8F;"></span> Lehrstätte</span>
      <span class="lp-legend__sep">|</span>
      <span class="lp-legend__item"><span class="lp-legend__swatch" style="background:#8B3A3A;"></span> Flucht</span>
      <span class="lp-legend__item"><span class="lp-legend__swatch" style="background:#3D7A5A;"></span> Geografisch</span>
      <span class="lp-legend__item"><span class="lp-legend__swatch" style="background:#6B4E8C;"></span> Lebensstil</span>
      <span class="lp-legend__item"><span class="lp-legend__swatch" style="background:#4A6E96;"></span> National</span>
      <span class="lp-legend__item"><span class="lp-legend__swatch" style="background:#B67D3D;"></span> Bildung</span>
      <span class="lp-legend__sep">|</span>
      <span class="lp-legend__item"><span class="lp-legend__swatch--dot" style="background:#004A8F;opacity:0.4;"></span> Auftritt</span>
    </div>

    <!-- Coverage -->
    <div class="lp-coverage" id="coverage"></div>
  </main>

  <footer class="app-footer">
    <a href="https://www.kug.ac.at" target="_blank" rel="noopener">KUG Graz</a>
    <span>·</span>
    <a href="impressum.html">Impressum</a>
    <span>·</span>
    <a href="https://github.com/DigitalHumanitiesCraft/m3gim" target="_blank" rel="noopener">GitHub</a>
    <span>·</span>
    <a href="index.html#mobilitaet">Zurück zur App</a>
  </footer>

  <script type="module">
    import { init } from './js/views/lebenspartitur.js';
    init().catch(err => {
      console.error('Lebenspartitur init error:', err);
      document.getElementById('chart-container').textContent = 'Fehler beim Initialisieren: ' + err.message;
    });
  </script>

</body>
</html>
